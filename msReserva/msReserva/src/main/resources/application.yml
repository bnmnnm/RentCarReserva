server:
  port: 8084

spring:
  application:
    name: msReserva
  datasource:
    url: jdbc:mysql://localhost:3306/reservas_db
    username: root
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true